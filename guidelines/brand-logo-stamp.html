<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--black); padding: 28px; font-family: var(--font-body); display: flex; align-items: center; gap: 40px; }
  .stage { width: 200px; display: flex; align-items: center; justify-content: center; height: 184px; background: var(--sand); border-radius: 14px; }
  .stage img { height: 160px; width: auto; }
  .notes { flex: 1; }
  .nl { font-family: var(--font-mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .nb { color: var(--white); font-size: 14px; line-height: 1.7; max-width: 320px; }
  .nb span { color: var(--muted); }
  .tag { font-family: var(--font-display); color: var(--green); font-size: 22px; letter-spacing: .04em; margin-top: 14px; }
</style>
</head>
<body>
  <div class="stage"><img src="../assets/bitumad-logo-circle.webp" alt="Bitumad stamp" /></div>
  <div class="notes">
    <div class="nl">Stamp / seal</div>
    <div class="nb">Circular badge — Madagascar silhouette with a red·green flag road. <span>Needs a light backing (sand or white). Use for favicons, seals, certification contexts.</span></div>
    <div class="tag">« BITUME PUR, FUTUR SÛR »</div>
  </div>
</body>
</html>
