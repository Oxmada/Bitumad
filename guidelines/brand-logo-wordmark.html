<!-- @dsCard group="Brand" viewport="700x220" name="Logo — horizontal wordmark" subtitle="Light lockup for dark surfaces · Madagascar map + flag road" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--black); padding: 28px; font-family: var(--font-body); display: flex; align-items: center; gap: 40px; }
  .stage { flex: 1; display: flex; align-items: center; justify-content: center; height: 150px; background: var(--dark); border: var(--hairline); border-radius: 14px; }
  .stage img { height: 64px; width: auto; }
  .notes { width: 220px; }
  .nl { font-family: var(--font-mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .nb { color: var(--white); font-size: 13px; line-height: 1.6; }
  .nb span { color: var(--muted); }
</style>
</head>
<body>
  <div class="stage"><img src="../assets/bitumad-logo-simple.webp" alt="Bitumad" /></div>
  <div class="notes">
    <div class="nl">Primary lockup</div>
    <div class="nb">Horizontal wordmark, light. <span>Use on --black / --dark surfaces. Clear space ≥ the map glyph width. Min height 32px.</span></div>
  </div>
</body>
</html>
