<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--black); font-family: var(--font-body); }
  .grid { position: relative; height: 96px; background-image: linear-gradient(var(--faint) .5px, transparent .5px), linear-gradient(90deg, var(--faint) .5px, transparent .5px); background-size: 40px 40px; -webkit-mask-image: radial-gradient(ellipse 80% 100% at 20% 50%, black 20%, transparent 80%); mask-image: radial-gradient(ellipse 80% 100% at 20% 50%, black 20%, transparent 80%); display: flex; align-items: center; padding: 0 28px; }
  .eyebrow { font-family: var(--font-mono); font-size: 11px; color: var(--green); letter-spacing: .14em; text-transform: uppercase; display: flex; align-items: center; gap: 12px; }
  .eyebrow::before { content:''; width: 24px; height: .5px; background: var(--green); }
  .ticker { background: var(--green); overflow: hidden; padding: 11px 0; white-space: nowrap; }
  .ti { font-family: var(--font-display); font-size: 14px; letter-spacing: .1em; color: var(--black); padding: 0 28px; }
  .dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: rgba(12,12,11,.4); margin: 0 18px; vertical-align: middle; }
</style>
</head>
<body>
  <div class="grid"><div class="eyebrow">Engineering grid · radial-masked</div></div>
  <div class="ticker"><span class="ti">DURABILITÉ ÉPROUVÉE<span class="dot"></span>QUALITÉ CERTIFIÉE ASTM<span class="dot"></span>BITUME 60/70<span class="dot"></span>LIVRAISON PARTOUT À MADAGASCAR</span></div>
</body>
</html>
