<!-- @dsCard group="Colors" viewport="700x190" name="Bitumen neutrals" subtitle="Warm near-black value steps — the asphalt foundation" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--black); font-family: var(--font-body); }
  .wrap { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--grout); padding: 28px; }
  .sw { border-radius: 10px; overflow: hidden; border: var(--hairline); }
  .chip { height: 86px; }
  .meta { padding: 12px 14px; background: var(--dark2); }
  .name { color: var(--white); font-size: 13px; font-weight: 600; margin-bottom: 3px; }
  .hex { color: var(--muted); font-family: var(--font-mono); font-size: 11px; letter-spacing: .04em; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="sw"><div class="chip" style="background:var(--black)"></div><div class="meta"><div class="name">--black</div><div class="hex">#0c0c0b</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--dark)"></div><div class="meta"><div class="name">--dark</div><div class="hex">#161614</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--dark2)"></div><div class="meta"><div class="name">--dark2</div><div class="hex">#1e1e1c</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--dark3)"></div><div class="meta"><div class="name">--dark3</div><div class="hex">#2a2a27</div></div></div>
  </div>
</body>
</html>
