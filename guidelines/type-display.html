<!-- @dsCard group="Type" viewport="700x230" name="Display — Bebas Neue" subtitle="Condensed caps for headlines; accent word in green" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--black); padding: 28px; font-family: var(--font-body); }
  .disp { font-family: var(--font-display); color: var(--white); letter-spacing: var(--track-display); line-height: 1.0; }
  .hero { font-size: 72px; line-height: .95; margin: 0 0 18px; }
  .hero em { font-style: normal; color: var(--green); }
  .sec { font-size: 40px; margin: 0 0 8px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--muted); letter-spacing: .04em; }
</style>
</head>
<body>
  <div class="disp hero">DES ROUTES <em>SOLIDES</em><br>COMMENCENT ICI</div>
  <div class="disp sec">FICHE TECHNIQUE</div>
  <div class="meta">Bebas Neue · UPPERCASE · tracking .02em · line-height .95–1.0 · hero clamp(64–120px)</div>
</body>
</html>
